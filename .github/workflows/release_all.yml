name: Build and Release All Kernels

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: [psyche, thyme, umi, munch, lmi, cmi, cas, apollo, alioth, elish, enuma, dagu, pipa]
        ksu_enabled: [true, false]

    name: Build ${{ matrix.device }} (${{ matrix.ksu_enabled && 'KSU' || 'NoKSU' }})

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git curl wget bison flex zip bc cpio libssl-dev ccache python-is-python3
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Setup Cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache_mikernel
          # 统一使用 global 标识，通过 run_id 保证每次运行能上传新缓存
          key: kernel-ccache-global-${{ github.run_id }}
          # 优先级：先找 global，再尝试找任何相关的
          restore-keys: |
            kernel-ccache-global-
            kernel-ccache-

      - name: Setup Toolchain (ZyC-Clang 15)
        run: |
          mkdir -p $HOME/zyc-clang
          cd $HOME/zyc-clang
          wget -q https://github.com/ZyCromerZ/Clang/releases/download/15.0.7-20251111-release/Clang-15.0.7-20251111.tar.gz
          tar -zxvf Clang-15.0.7-20251111.tar.gz

      - name: Run Build Script
        run: |
          chmod +x build.sh
          if [ "${{ matrix.ksu_enabled }}" = "true" ]; then
            bash build.sh ${{ matrix.device }} ksu
          else
            bash build.sh ${{ matrix.device }}
          fi

      - name: Upload Local Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-artifacts-${{ matrix.device }}-${{ matrix.ksu_enabled && 'KSU' || 'NoKSU' }}
          path: ./*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_kernels
          pattern: Kernel-artifacts-*
          merge-multiple: true

      - name: Prepare Release Info
        id: info
        run: |
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "GIT_SHA=$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV
          echo "TAG_NAME=v$(date +'%Y%m%d')-$(git rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "ApartTUSITU Kernel Build - ${{ env.BUILD_DATE }} (${{ env.GIT_SHA }})"
          body: |
            ## 自动构建内核发布 / Automated Kernel Release
            
            - **构建日期 / Build Date:** ${{ env.BUILD_DATE }}
            - **提交哈希 / Commit SHA:** `${{ env.GIT_SHA }}`
            - **包含设备 / Devices:** psyche, thyme, umi, munch, lmi, cmi, cas, apollo, alioth, elish, enuma, dagu, pipa
            
            ---
            **分类指南 / Instruction:**
            - **MIUI**: 适用于小米官方或基于小米官方修改的 ROM。
            - **AOSP**: 适用于类原生 ROM (LineageOS, Pixel Experience 等)。
            - **SukiSU-SUSFS**: 已集成 ReSukiSU 和 SuSFS 补丁。
          files: all_kernels/*.zip

      - name: Send Files to Telegram
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          MSG="🚀 *ApartTUSITU Kernel 构建任务完成* %0A%0A"
          MSG+="📅 *日期:* ${{ env.BUILD_DATE }} %0A"
          MSG+="🔗 [查看 GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ env.TAG_NAME }}) %0A%0A"
          MSG+="📦 开始上传文件..."
          
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
            -d "chat_id=$TG_CHAT_ID" \
            -d "parse_mode=Markdown" \
            -d "text=$MSG"

          for file in all_kernels/*.zip; do
            filename=$(basename "$file")
            echo "正在上传: $filename"
            
            curl -s -F chat_id="$TG_CHAT_ID" \
                 -F document=@"$file" \
                 -F caption="✅ $filename" \
                 "https://api.telegram.org/bot$TG_TOKEN/sendDocument"
            
            sleep 1
          done